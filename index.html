<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Vávra | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* ===== HEADER ===== */
header {
    padding: 40px 20px 20px 20px;
}
.profile-container {
    display: flex;
    justify-content: center;
}
.profile-pic {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #38bdf8;
    box-shadow: 0 0 25px rgba(56,189,248,0.6);
}
h1 { margin-top: 20px; font-size: 28px; }
.header-subtitle {
    font-size: 16px;
}
/* Efekt při najetí myší – karta se lehce zvedne */
.card:hover{
    transform: translateY(-6px);
    transition: 0.3s;
}


/* ===== NAVIGATION ===== */
nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: #1e293b;
}
nav button {
    padding: 15px 25px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
nav button:hover { background: #334155; }

/* ===== SECTIONS ===== */
.section {
    display: none;
    padding: 40px 15px;
    max-width: 1200px;
    margin: 0 auto;
}
.section.active { display: block; }

/* ===== GALLERY ===== */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    margin-top: 30px;
    justify-items: center;
}


/* ===== CARD ===== */
.card {
    background: transparent;
    padding: 10px 0;
    border-radius: 10px;
    transition: 0.3s;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    object-position: bottom;
    border-radius: 10px;
    display: block;
}
.card video {
    width: 100%;
    border-radius: 10px;
    display: block;
    background: #000;
}

/* ===== 3D VIEWER ===== */
model-viewer {
    width: 100%;
    height: 300px;
    border-radius: 10px;
    background: black;
    display: block;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
    .gallery { grid-template-columns: 1fr; }
    .profile-pic { width: 120px; height: 120px; }
    nav { flex-direction: column; }
    nav button { width: 100%; }
    model-viewer, .card img, .card video { height: 250px; }
}

/* ===== PHOTOSHOP CAROUSEL ===== */
.carousel { position: relative; overflow: hidden; border-radius: 10px; }
.slides { display: flex; transition: transform 0.3s ease; }
.slides img {
    width: 100%;
    height: auto;
    object-fit: cover;
    flex-shrink: 0;
    border-radius: 10px;
}
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 1.5rem;
    border-radius: 4px;
}
.prev { left: 10px; }
.next { right: 10px; }

</style>
</head>

<body>

<header>
    <div class="profile-container">
        <img src="profilovka.jpg" alt="Profilovka" class="profile-pic">
    </div>
    <h1>Daniel Vávra</h1>
    <p class="header-subtitle">SPŠ Třebešín - IT ✅<br>VOŠ - Interaktivní grafika 🕒</p>
</header>


<nav>
    <button onclick="showTab('sec3d')">3D</button>
    <button onclick="showTab('secanimace')">Animace</button>
    <button onclick="showTab('secfilmy')">Filmy</button>
    <button onclick="showTab('secphotoshop')">Photoshop</button>
</nav>

<div id="welcome">
<h2>Vyber kategorii</h2>
</div>

<!-- ===== 3D SEKCE ===== -->
<div id="sec3d" class="section">
    <div class="gallery">
        <div class="card">
            <h4>Z REFERENCE</h4>
            <model-viewer src="anvil2.glb" alt="3D model" auto-rotate camera-controls environment-image="neutral.hdr" exposure="1.5"></model-viewer>
        </div>
        <div class="card">
            <h4>ArchViz</h4>
            <model-viewer src="arch9.glb" alt="3D model" auto-rotate camera-controls environment-image="neutral.hdr" exposure="1.5"></model-viewer>
        </div>
        <div class="card">
            <h4>Photo-FX</h4>
            <img src="PhotoFX.png" alt="PhotoFX render">
        </div>
    </div>
</div>

<!-- ===== ANIMACE SEKCE ===== -->
<div id="secanimace" class="section">
    <div class="gallery">
        <div class="card">
            <h4>SPŠ Třebesín</h4>
            <video controls>
                <source src="godofwar.mov" type="video/mp4">
            </video>
        </div>
        <div class="card">
            <h4>VOŠ - Talentová zkouška</h4>
            <video controls>
                <source src="Film.mp4" type="video/mp4">
            </video>
        </div>
        <div class="card">
            <h4>VOŠ - Zkouškové období</h4>
            <video controls>
                <source src="video3.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<!-- ===== FILMY SEKCE ===== -->
<div id="secfilmy" class="section">
    <div class="gallery">
        <div class="card">
            
            <video controls>
                <source src="vavra_at4.mp4" type="video/mp4">
            </video>
        </div>
        <div class="card">
           
            <video controls>
                <source src="Oneiros.mp4" type="video/mp4">
            </video>
        </div>
        <div class="card">

            <video controls>
                <source src="film3.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<!-- ===== PHOTOSHOP SEKCE ===== -->
<div id="secphotoshop" class="section">
    <div class="gallery">
        <div class="card">
            <div class="carousel">
                <div class="slides">
                    <img src="BryanTitle.png" alt="Photoshop 1">
                    <img src="Bryan1.png" alt="Photoshop 2">
                    <img src="Bryan2.png" alt="Photoshop 3">
                    <img src="Bryan3.png" alt="Photoshop 4">
                </div>
                <button class="prev">&#10094;</button>
                <button class="next">&#10095;</button>
            </div>
        </div>
        <div class="card">
            <div class="carousel">
                <div class="slides">
                    <img src="FoodTitle.png" alt="Photoshop 1">
                    <img src="1.png" alt="Photoshop 2">
                    <img src="2.png" alt="Photoshop 3">
                    <img src="3.png" alt="Photoshop 4">
                </div>
                <button class="prev">&#10094;</button>
                <button class="next">&#10095;</button>
            </div>
        </div>
        <div class="card">
            <div class="carousel">
                <div class="slides">
                    <img src="BryanTitle.png" alt="Photoshop 1">
                    <img src="Bryan1.png" alt="Photoshop 2">
                    <img src="Bryan2.png" alt="Photoshop 3">
                    <img src="Bryan3.png" alt="Photoshop 4">
                </div>
                <button class="prev">&#10094;</button>
                <button class="next">&#10095;</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== JS ===== -->
<script>
// Zobrazení jednotlivých sekcí
function showTab(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');


// "vyber kategorii - potm zmizi po kliknuti funkce"
    document.querySelectorAll('.section').forEach(sec =>
        sec.classList.remove('active')
    );

    document.getElementById(id).classList.add('active');

    /* Po prvním kliknutí zmizí úvodní text */
    const welcome = document.getElementById("welcome");
    if(welcome){
        welcome.style.display = "none";
    }



}

// Carousel pro Photoshop
document.querySelectorAll('.carousel').forEach(carousel => {

    const slides = carousel.querySelector('.slides');
    const images = slides.querySelectorAll('img');
    const prev = carousel.querySelector('.prev');
    const next = carousel.querySelector('.next');

    let index = 0;

    function updateSlide() {
        slides.style.transform = `translateX(-${index * 100}%)`;
    }

    next.addEventListener('click', () => {
        index = (index + 1) % images.length;
        updateSlide();
    });

    prev.addEventListener('click', () => {
        index = (index - 1 + images.length) % images.length;
        updateSlide();
    });

});
</script>

</body>
</html>
